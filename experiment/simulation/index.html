<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div class="container-fluid simulation-container py-3">
      <div class="simulation-center-wrapper">
        <div class="row">
          <!-- Left: Problem, code, compile/run, output -->
          <div class="col-lg-8 col-md-7 col-12 mb-3">
            <div class="form-group mb-3">
              <label for="problem-select"
                ><strong>Select Problem:</strong></label
              >
              <select class="form-control" id="problem-select"></select>
            </div>
            <div id="problem-desc" class="problem-statement mb-3"></div>
            <div id="code-template" class="code-area mb-3"></div>
            <div class="d-flex flex-wrap gap-2 mb-2">
              <button id="submit-btn" class="btn btn-primary mr-2">
                Compile
              </button>
              <button id="run-btn" class="btn btn-success" disabled>Run</button>
            </div>
            <div id="feedback" class="output-area mb-2"></div>
            <div id="runtime-output" class="output-area"></div>
          </div>
          <!-- Right: Hints -->
          <div class="col-lg-4 col-md-5 col-12 mb-3">
            <div class="hints-area mb-3">
              <div class="d-flex align-items-center mb-2">
                <label for="hint-level" class="mb-0 mr-2"
                  ><strong>Select Hint:</strong></label
                >
                <select
                  id="hint-level"
                  class="form-control form-control-sm w-auto"
                ></select>
              </div>
              <div id="hints"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="js/main.js"></script>
  </body>
</html>
